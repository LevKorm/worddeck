<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #1E1E1E;
      color: #F0ECE4;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    h2 { font-size: 16px; font-weight: 600; }
    p  { font-size: 12px; color: #9E9A92; line-height: 1.5; }
    button {
      background: #E8A838;
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:disabled { background: #2A2A2A; color: #6B6760; cursor: not-allowed; }
    #status {
      font-size: 12px;
      color: #9E9A92;
      min-height: 18px;
    }
    #status.error { color: #F87171; }
    #status.done  { color: #4ADE80; }
  </style>
</head>
<body>
  <h2>WordDeck Design System</h2>
  <p>Generates all screens, color styles, and text styles from the live codebase.</p>
  <div id="status"></div>
  <button id="btn" onclick="generate()">Generate Design System</button>

  <script>
    function generate() {
      document.getElementById('btn').disabled = true;
      document.getElementById('status').className = '';
      document.getElementById('status').textContent = 'Starting...';
      parent.postMessage({ pluginMessage: { type: 'generate' } }, '*');
    }

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      const status = document.getElementById('status');
      if (msg.type === 'progress') {
        status.textContent = msg.text;
      } else if (msg.type === 'done') {
        status.className = 'done';
        status.textContent = `✓ Done — ${msg.count} screens created`;
        document.getElementById('btn').disabled = false;
      } else if (msg.type === 'error') {
        status.className = 'error';
        status.textContent = '✕ ' + msg.text;
        document.getElementById('btn').disabled = false;
      }
    };
  </script>
</body>
</html>

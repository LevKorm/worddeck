<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="WordDeck — Learn new words with smart flashcards">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="WordDeck">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>WordDeck</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preload icon font so glyphs are cached before Flutter renders -->
  <link rel="preload" href="assets/fonts/MaterialIcons-Regular.otf" as="font" type="font/otf" crossorigin>

  <!-- Preload Google Fonts so they're ready before Flutter renders -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:wght@400;600&display=swap">

  <style>
    html, body {
      background-color: #0D0D0D;
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    /* Splash overlay — stays on top until Flutter removes it */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background-color: #0D0D0D;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease-out;
    }
    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #splash .logo-text {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #E8A838;
      letter-spacing: -0.5px;
    }
    #splash .loader {
      margin-top: 24px;
      width: 32px;
      height: 32px;
      border: 3px solid #1E1E1E;
      border-top-color: #E8A838;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Splash screen — removed by Flutter after first frame + fonts ready -->
  <div id="splash">
    <div class="logo-text">WordDeck</div>
    <div class="loader"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
